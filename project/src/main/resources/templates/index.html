<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demo Quản lý Đơn hàng</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f5f9fd;
      }
      .navbar {
        background-color: #1a94ff;
      }
      .navbar-brand,
      .nav-link,
      .text-brand {
        color: #fff !important;
      }
      .card {
        border: none;
        border-radius: 15px;
        transition: all 0.2s ease;
      }
      .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
      }
      .btn-tiki {
        background-color: #1a94ff;
        color: #fff;
        border-radius: 10px;
      }
      .btn-tiki:hover {
        background-color: #0066cc;
        color: #fff;
      }
      .price {
        color: #1a94ff;
        font-weight: 600;
      }
      .banner {
        background: linear-gradient(90deg, #1a94ff, #56ccf2);
        color: #fff;
        border-radius: 20px;
        padding: 40px 20px;
        text-align: center;
        margin-bottom: 40px;
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/">
          <i class="bi bi-bag-check-fill"></i> Demo store
        </a>
        <div class="d-flex align-items-center text-white">
          <a href="/shop" class="text-white text-decoration-none me-3">
            <i class="bi bi-person-circle"></i> Khách hàng
          </a>
          <a href="/shop" class="btn btn-light btn-sm position-relative">
            <i class="bi bi-cart4 text-primary"></i> Giỏ hàng
            <span
              th:if="${session.CURRENT_ORDER != null}"
              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
              th:text="${#lists.size(session.CURRENT_ORDER.items)}"
              >0</span
            >
          </a>
        </div>
      </div>
    </nav>

    <section class="banner container mt-4">
      <h2 class="fw-bold mb-2">Chào mừng</h2>
      <p class="lead mb-0">
        Demo hệ thống.<br />
        Bạn có thể xem sản phẩm, thêm vào giỏ và kiểm tra hoá đơn
      </p>
    </section>

    <div class="container">
      <div class="row g-4">
        <div class="col-md-3" th:each="p : ${products}">
          <div class="card h-100 text-center shadow-sm">
            <img
              src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png"
              class="card-img-top p-4"
              style="height: 180px; object-fit: contain"
              alt="product"
            />
            <div class="card-body">
              <h6 class="fw-bold" th:text="${p.name}">Tên sản phẩm</h6>
              <p class="text-secondary small mb-1" th:text="${p.category}">
                Phân loại
              </p>
              <div
                class="price mb-3"
                th:text="${#numbers.formatInteger(p.unitPrice,0,'POINT') + ' ₫'}"
              >
                0 ₫
              </div>

              <form method="post" action="/shop/add-item">
                <input type="hidden" name="productId" th:value="${p.id}" />
                <input type="hidden" name="quantity" value="1" />
                <button class="btn btn-tiki w-100">
                  <i class="bi bi-cart-plus"></i> Thêm vào giỏ
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer
      class="bg-white border-top mt-5 py-3 text-center text-secondary small"
    >
      2025 Nhóm OOP_NO4_25_26_DucManh_DucViet_HaiAnh
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
